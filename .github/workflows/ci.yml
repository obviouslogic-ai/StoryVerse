name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify index.html exists
        run: |
          if [ ! -f "index.html" ]; then
            echo "::error::index.html not found at repo root"
            exit 1
          fi
          echo "PASS index.html exists."

      - name: Validate JSON data files
        run: |
          FAIL=0
          for f in data/*.json; do
            if [ -f "$f" ]; then
              python3 -m json.tool "$f" > /dev/null 2>&1 || { echo "::error::Invalid JSON: $f"; FAIL=1; }
              echo "PASS $f"
            fi
          done
          exit $FAIL

      - name: Verify required repo files
        run: |
          MISSING=0
          for f in AGENTS.md ARCHITECTURE.md README.md package.json data/sample-characters.json; do
            if [ ! -f "$f" ]; then
              echo "::error::Required file missing: $f"
              MISSING=1
            else
              echo "PASS $f"
            fi
          done
          exit $MISSING
