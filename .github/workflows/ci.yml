name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify index.html exists
        run: |
          if [ ! -f "index.html" ]; then
            echo "::error::index.html not found at repo root"
            exit 1
          fi
          echo "index.html exists."

      - name: Validate JSON data files
        run: |
          for f in data/*.json; do
            if [ -f "$f" ]; then
              python3 -m json.tool "$f" > /dev/null || { echo "::error::Invalid JSON: $f"; exit 1; }
              echo "PASS $f"
            fi
          done

      - name: Check for broken local asset references
        run: |
          echo "Checking that referenced local files exist..."
          MISSING=0
          for ref in $(grep -oP 'src="(?!https?://|//)[^"]+"|href="(?!https?://|//|#|mailto:)[^"]+"' index.html | sed 's/.*="//;s/"$//' || true); do
            if [ ! -f "$ref" ] && [ ! -f "./$ref" ]; then
              echo "::warning::Referenced file not found: $ref"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::$MISSING local references could not be resolved."
          fi
          echo "Asset reference check complete."
