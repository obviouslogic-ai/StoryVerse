# HELIos Reliability Gate (adapted for StoryVerse static MVP)
# The static MVP has no server-side code, so side-effect checks scan nothing.
# These jobs are kept as structural placeholders that pass cleanly today and
# become real gates once backend code lands in src/.
name: Reliability Gate

on:
  pull_request:
    branches: [main]

jobs:
  idempotency-check:
    name: "REL-001: Idempotency Controls"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "REL-001.1 — Verify idempotency key usage in side-effecting modules"
        run: |
          echo "Scanning for side-effect modules without idempotency markers..."
          TARGETS=$(find . -path ./node_modules -prune -o -path ./helios -prune -o -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" \) -print 2>/dev/null | grep -E "(webhook|worker|queue|consumer|job|integration)" || true)
          if [ -z "$TARGETS" ]; then
            echo "No side-effecting targets matched naming convention; skipping (static MVP)."
            exit 0
          fi
          MISSING=""
          for file in $TARGETS; do
            if ! grep -q -E "(idempotencyKey|idempotent|dedupe|operationId)" "$file"; then
              MISSING="$MISSING  $file\n"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Potential side-effect modules missing idempotency controls:"
            echo -e "$MISSING"
            exit 1
          fi
          echo "Idempotency markers found in scoped modules."

  retry-policy-check:
    name: "REL-002: Retry Policy Safety"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "REL-002.1 — Block obvious blind retries on 4xx"
        run: |
          echo "Checking retry code for broad 4xx retries..."
          VIOLATIONS=$(grep -rn -E "status\s*>=\s*400.*status\s*<\s*500.*retry|status\s*<\s*500.*retry|retry\(.+4xx" index.html 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Blind retry patterns detected for potential permanent failures:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No obvious blind retry-on-4xx patterns found."
