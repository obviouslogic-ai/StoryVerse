# HELIos Resilience Gate (adapted for StoryVerse static MVP)
# Verifies governance artifacts exist. Full resilience evidence
# (runbooks, drill logs, release-delta evals) is out of scope for
# this MVP but documented in AGENTS.md and docs/MVP_FEATURES.md.
name: Resilience Gate

on:
  pull_request:
    branches: [main]

jobs:
  governance-artifacts:
    name: "RES-001: Governance Artifacts"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "RES-001.1 — Verify AGENTS.md exists"
        run: |
          if [ ! -f "AGENTS.md" ]; then
            echo "::error::AGENTS.md is required by HELIos."
            exit 1
          fi
          echo "PASS AGENTS.md exists."

      - name: "RES-001.2 — Verify ARCHITECTURE.md exists"
        run: |
          if [ ! -f "ARCHITECTURE.md" ]; then
            echo "::error::ARCHITECTURE.md is required."
            exit 1
          fi
          echo "PASS ARCHITECTURE.md exists."

      - name: "RES-001.3 — Verify HELIos policies are present"
        run: |
          if [ ! -d "helios/policies" ]; then
            echo "::error::helios/policies/ directory missing."
            exit 1
          fi
          echo "PASS helios/policies/ exists."

      - name: "RES-001.4 — Note on full resilience evidence"
        run: |
          echo "INFO: Full resilience evidence (runbooks, drill logs, release-delta evals)"
          echo "is out of scope for the static MVP. See AGENTS.md Demo vs. Production Status."
          echo "Resilience evidence will be required when backend infrastructure is added."
          if [ -d "helios/reference/operations" ]; then
            echo "PASS helios/reference/operations/ exists (mirrored from HELIos source)."
          fi
